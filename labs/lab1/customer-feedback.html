<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Customer Feedback Survey</title>
    </head>
    <body>
        <h1>Customer Feedback Survey</h1>
        <p><em>Your opinion matters to us! Please share your experience.</em></p>
        <fieldset>
            <legend>Customer Information</legend><br>
            
            <label for="fullName">Full Name *</label><br>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required><br>
            <br>
            <label for="email">Email Address *</label><br>
            <input type="text" id="email" name="email" placeholder="your.email@example.com" required><br>
            <br>
            <label for="phonenumber">Phone Number</label><br>
            <input type="text" id="phonenumber" name="phonenumber" placeholder="+1 (555) 123-4567" required><br>
            <br>
            <label for="customer-id">Customer ID</label><br>
            <input type="text" id="customer-id" name="customer-id" placeholder="your.email@example.com" required><br>
        </fieldset>
        
        <fieldset>
            <legend>Service Evaluation</legend><br>

            <label for="servicerating">Overall Service Rating (1-5) *</label><br>
    </body>
</html>
